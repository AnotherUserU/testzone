<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Team Composition Guide - Guest View</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="shared/styles/variables.css">
  <link rel="stylesheet" href="shared/styles/base.css">
  <link rel="stylesheet" href="shared/styles/cards.css">
  <link rel="stylesheet" href="shared/styles/modals.css">
  <link rel="stylesheet" href="shared/styles/navigation.css">
  <link rel="stylesheet" href="shared/styles/responsive.css">
</head>
<body class="readonly">

<div class="nav-header">
  <div class="nav-menu">
    <button class="nav-btn active" onclick="switchMode('dungeon')">Dungeon Teams</button>
    <button class="nav-btn" onclick="switchMode('story')">Story Teams</button>
  </div>
  <button class="theme-toggle" id="themeBtn">☀️ Light Mode</button>
</div>

<a href="admin.html" class="admin-link">🛠 Admin</a>
<div id="roleBadge">VIEW MODE</div>
<div id="fbStatus">Connecting...</div>

<!-- Loading Frame -->
<div class="loading-screen" id="appLoading">
  <div class="loading-title">LOADING TEAMS...</div>
  <div class="loading-bar-track">
    <div class="loading-bar-fill"></div>
  </div>
</div>

<div id="appContent" style="display:none;">
  <div id="dungeonMode" class="mode-section active">
    <!-- Firebase Data will be injected here safely via DOMPurify -->
    <div id="dungeonSection"></div>
    <div id="newDungeonSection"></div>
  </div>

  <div id="storyMode" class="mode-section">
    <div id="storySection"></div>
    <div id="newStorySection"></div>
  </div>

  <!-- Sections, Modifiers & Credits -->
  <div id="customSectionsArea"></div>

  <div style="max-width:1280px; margin:40px auto; padding:0 20px;">
    <div class="section-label" style="text-align:left; padding:20px 0 10px;">🛡 MODIFIER PRIORITY</div>
    <div id="modSettingsList" style="display:flex; flex-direction:column; gap:8px;"></div>
  </div>

  <div style="max-width:1280px; margin:40px auto 60px; padding:0 20px;">
    <div class="section-label" style="text-align:left; padding:20px 0 10px;">📜 CREDITS</div>
    <div id="creditsList" style="display:flex; flex-direction:column; gap:8px;"></div>
  </div>

  <!-- Download Float -->
  <button class="float-xl" onclick="showModal('dlModal')">⬇ Download Pages</button>
  <div class="watermark" id="dlWatermark" style="display:none;">GENERATED VIA SRE TEAMS GUIDE</div>
</div>

<!-- Download Modal -->
<div class="dl-ov" id="dlModal">
  <div class="dl-box">
    <div class="dl-close" onclick="hideModal('dlModal')">✖</div>
    <div class="dl-title">DOWNLOAD CONFIG</div>
    <div class="dl-section-label">SELECT SCOPE</div>
    <div class="dl-radio-group">
      <label class="dl-radio active">
        <input type="radio" name="dlType" value="fullscreen" checked style="display:none;">
        <span class="dl-radio-icon">🖥️</span>
        <div><div class="dl-radio-name">Full Screen</div><div class="dl-radio-sub">Active mode</div></div>
      </label>
      <label class="dl-radio">
        <input type="radio" name="dlType" value="section" style="display:none;">
        <span class="dl-radio-icon">✂️</span>
        <div><div class="dl-radio-name">Specific Section</div><div class="dl-radio-sub">Choose below</div></div>
      </label>
    </div>
    <select id="dlSectionSelect" class="dl-select" style="display:none;"></select>
    <div class="dl-modal-btns">
      <button class="btn btn-apply" id="startDlBtn">GENERATE IMAGE</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script type="module">
  import { initTheme } from './shared/js/theme.js';
  import { showToast, showModal, hideModal } from './shared/js/utils.js';
  import { setupDownloadModal } from './shared/js/download.js';

  window.showModal = showModal;
  window.hideModal = hideModal;

  window.switchMode = function(mode) {
    document.querySelectorAll('.mode-section').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
    document.getElementById(mode + 'Mode')?.classList.add('active');
    event.target.classList.add('active');
  }

  document.addEventListener('DOMContentLoaded', () => {
    initTheme();
    setupDownloadModal();
    loadFirebaseData();
  });

  async function loadFirebaseData() {
    const st = document.getElementById('fbStatus');
    try {
      // 1. Get Firebase Config
      const res = await fetch('/api/config');
      if(!res.ok) throw new Error();
      const cfg = await res.json();

      // 2. Load SDK dynamically
      if(typeof firebase === 'undefined') {
        const sc1 = document.createElement('script');
        sc1.src = 'https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js';
        document.head.appendChild(sc1);
        await new Promise(r => sc1.onload = r);

        const sc2 = document.createElement('script');
        sc2.src = 'https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js';
        document.head.appendChild(sc2);
        await new Promise(r => sc2.onload = r);
      }

      firebase.initializeApp(cfg);
      const db = firebase.database();
      
      db.ref('guide').once('value').then(snap => {
        const data = snap.val();
        if(data) {
          // CRITICAL SECURITY FIX: Sanitize all loaded HTML
          if(data.dungeonHTML) document.getElementById('dungeonSection').innerHTML = DOMPurify.sanitize(data.dungeonHTML);
          if(data.storyHTML) document.getElementById('storySection').innerHTML = DOMPurify.sanitize(data.storyHTML);
          if(data.newDungeonHTML) document.getElementById('newDungeonSection').innerHTML = DOMPurify.sanitize(data.newDungeonHTML);
          if(data.newStoryHTML) document.getElementById('newStorySection').innerHTML = DOMPurify.sanitize(data.newStoryHTML);
          if(data.customSectionsHTML) document.getElementById('customSectionsArea').innerHTML = DOMPurify.sanitize(data.customSectionsHTML);
          if(data.modHTML) document.getElementById('modSettingsList').innerHTML = DOMPurify.sanitize(data.modHTML);
          if(data.creditsHTML) document.getElementById('creditsList').innerHTML = DOMPurify.sanitize(data.creditsHTML);
        }
        
        st.textContent = '✅ Database connected';
        st.className = 'show ok';
        setTimeout(() => st.classList.remove('show'), 2000);
        
        // Hide skeleton, show content
        document.getElementById('appLoading').style.display = 'none';
        document.getElementById('appContent').style.display = 'block';

      }).catch(e => {
        throw e;
      });

    } catch(e) {
      console.error(e);
      st.textContent = '❌ Failed to load data';
      st.className = 'show err';
      showToast('Failed to connect to cloud database.', true);
    }
  }
</script>
</body>
</html>
